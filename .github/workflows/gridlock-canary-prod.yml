name: Gridlock Canary Production

on:
  workflow_dispatch:
  deployment_status:
  schedule:
    - cron: "0 */3 * * *"

jobs:
  canary-prod:
    if: github.event_name != 'deployment_status' || github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GRIDLOCK_CANARY_BASE_URL_PROD: ${{ github.event.deployment_status.target_url || secrets.GRIDLOCK_CANARY_BASE_URL_PROD }}
      GRIDLOCK_CANARY_MAIL_PROVIDER: agentmail
      GRIDLOCK_CANARY_MAIL_API_KEY: ${{ secrets.GRIDLOCK_CANARY_MAIL_API_KEY }}
      GRIDLOCK_CANARY_MAIL_DOMAIN: ${{ secrets.GRIDLOCK_CANARY_MAIL_DOMAIN }}
      GRIDLOCK_CANARY_PERSONA_A_EMAIL: ${{ secrets.GRIDLOCK_CANARY_PERSONA_A_EMAIL }}
      GRIDLOCK_CANARY_PERSONA_B_EMAIL: ${{ secrets.GRIDLOCK_CANARY_PERSONA_B_EMAIL }}
      GRIDLOCK_CANARY_ALERT_WEBHOOK: ${{ secrets.GRIDLOCK_CANARY_ALERT_WEBHOOK }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - id: canary-config
        name: Check canary config
        run: |
          missing=()

          [ -n "$GRIDLOCK_CANARY_BASE_URL_PROD" ] || missing+=("GRIDLOCK_CANARY_BASE_URL_PROD")
          [ -n "$GRIDLOCK_CANARY_MAIL_API_KEY" ] || missing+=("GRIDLOCK_CANARY_MAIL_API_KEY")
          [ -n "$GRIDLOCK_CANARY_MAIL_DOMAIN" ] || missing+=("GRIDLOCK_CANARY_MAIL_DOMAIN")
          [ -n "$GRIDLOCK_CANARY_PERSONA_A_EMAIL" ] || missing+=("GRIDLOCK_CANARY_PERSONA_A_EMAIL")
          [ -n "$GRIDLOCK_CANARY_PERSONA_B_EMAIL" ] || missing+=("GRIDLOCK_CANARY_PERSONA_B_EMAIL")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
            echo "::warning title=Canary skipped::Missing required config: ${missing[*]}"
            {
              echo "## Gridlock Canary Skipped"
              echo
              echo "Missing required config: ${missing[*]}"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
      - run: npm run canary:gridlock -- --env prod --scenario full-two-user
        if: steps.canary-config.outputs.enabled == 'true'
      - run: npm run canary:gridlock -- --env prod --scenario fresh-signup-smoke
        if: github.event_name == 'schedule' && steps.canary-config.outputs.enabled == 'true'
      - uses: actions/upload-artifact@v6
        if: always() && hashFiles('.e2e-artifacts/**') != ''
        with:
          name: gridlock-canary-prod
          path: .e2e-artifacts/
          if-no-files-found: warn
