<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Black background -->
  <rect width="32" height="32" fill="#000000"/>
  <!-- Red speed stripe — top brand element -->
  <rect x="0" y="0" width="32" height="3" fill="#E10600"/>
  <!-- Bold "G" lettermark in white, clean at 16×16 and above -->
  <text
    x="16"
    y="26"
    font-family="'Arial Narrow', 'Impact', 'Arial Black', Arial, Helvetica, sans-serif"
    font-weight="900"
    font-size="23"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="-1"
  >G</text>
  <!-- Red underline accent below the G -->
  <rect x="9" y="28" width="14" height="2" fill="#E10600"/>
</svg>
